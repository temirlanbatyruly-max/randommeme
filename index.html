<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memes Generator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }
    body {
      background-image: url("app-background.png");
      background-size: 3.12em;
    }
    .container {
      width: 80%;
      max-width: 37.5em;
      padding: 3em 1.5em;
      background-color: #ffffff;
      position: absolute;
      transform: translate(-50%, -50%);
      top: 50%;
      left: 50%;
      border-radius: 0.6em;
      box-shadow: 0 1.4em 3em rgba(20, 16, 39, 0.3);
    }
    .container img {
      display: block;
      height: 25em;
      max-width: 80%;
      margin: 0 auto 1em auto;
    }
    .container h3 {
      display: block;
      font-size: 1em;
      margin: 0.5em auto 2em auto;
      width: 70%;
      font-weight: 400;
      text-align: center;
      text-transform: capitalize;
      color: #737081;
      letter-spacing: 0.03em;
    }
    .container button {
      display: block;
      margin: 0 auto;
      font-size: 1.2em;
      padding: 0.8em 2em;
      border-radius: 2em;
      background-color: #7f5eff;
      border: none;
      outline: none;
      color: #ffffff;
      cursor: pointer;
    }
    @media screen and (max-width: 600px) {
      .container {
        font-size: 14px;
      }
    }
  </style>
  <body>
    <div class="container">
      <img src="demo-meme.jpg" alt="meme" id="meme" />
      <h3 id="title">hahaha!</h3>
      <button id="get-meme-btn">Get Meme</button>
    </div>
    <script>
        let meme = document.getElementById("meme");
        let title = document.getElementById("title");
        let getMemeBtn = document.getElementById("get-meme-btn");
        //API URL
        let url = "https://meme-api.com/gimme/";
        //Array of subreddits of your choice
        let subreddits = ["catmemes", "wholesomemes", "dogmemes", "me_irl"];

        //Function To Get Random Meme
        let getMeme = () => {
          //Choose a random subreddit from the subreddits array
          let randomSubreddit =
            subreddits[Math.floor(Math.random() * subreddits.length)];
          //Fetch data from the api
          fetch(url + randomSubreddit)
            .then((resp) => resp.json())
            .then((data) => {
              let memeImg = new Image();
              //Display meme image and title only after the image loads
              memeImg.onload = () => {
                meme.src = data.url;
                title.innerHTML = data.title;
              };
              memeImg.src = data.url;
            });
        };

//Call the getMeme() on button click and on window load
getMemeBtn.addEventListener("click", getMeme);
window.addEventListener("load", getMeme);
    </script>
  </body>
</html>
</html>
